<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Nueva Escuela</title>
    <style>
        .form-control::placeholder {
            color: red;
            opacity: 1;
        }
        .form-control:focus{
            border-color: red;
            background-color: transparent;
        }
        .btn-cancel{
            color: #ffc107;
            border-color: #ffc107;
            background-color: transparent;
        }
        .btn-cancel:hover{
            color: black;
            background-color: #ffc107;
            border-color: #ffc107;
        }
        .btn-save{
            color: red;
            border-color: red;
            background-color: transparent;
        }
        .btn-save:hover{
            color: black;
            background-color: red;
            border-color: red;
        }
        .btn-save:disabled{
            color: red;
            border-color: red;
            background-color: transparent;
        }
    </style>
</head>

<body class="bg-dark">
    <nav class="navbar navbar-danger bg-danger mb-5 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-mortarboard-fill me-2"></i>Gestión Escolar</span>
        </div>
    </nav>

    <div class="container mt-5 col-md-4">
        <div class="card p-4 bg-dark border border-danger">
            <h4 class="text-danger">Registrar Escuela</h4>
            <form th:action="@{/escuelas/guardar}" th:object="${escuela}" method="post">
                <div class="mb-3">
                    <label class="text-danger">Nombre:</label>
                    <input type="text" th:field="*{nombre}" class="form-control bg-dark text-light border border-danger" required>
                </div>
                <button type="submit" class="btn btn-save">Guardar</button>
                <a th:href="@{/escuelas}" class="btn border-warning btn-cancel">Cancelar</a>
            </form>
        </div>
    </div>
</body>

</html>
